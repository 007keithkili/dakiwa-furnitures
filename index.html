<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dakiwa Furnitures – Modern E‑commerce</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        :root {
            --color-off-white: #FAFAF9;
            --color-charcoal: #1E1E1E;
            --color-warm-accent: #D4A373;
            --color-warm-accent-light: #e8c9a8;
            --color-warm-accent-dark: #b8895a;
            --color-gray-100: #f5f5f4;
            --color-gray-200: #e7e5e4;
            --color-gray-300: #d6d3d1;
            --color-gray-400: #a8a29e;
            --color-gray-500: #78716c;
            --color-gray-600: #57534e;
            --color-gray-700: #44403c;
            --color-gray-800: #292524;
            --color-gray-900: #1c1917;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-serif: 'Playfair Display', Georgia, serif;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.06);
            --shadow-medium: 0 12px 48px rgba(0, 0, 0, 0.10);
            --shadow-hover: 0 20px 60px rgba(0, 0, 0, 0.14);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --max-width: 1440px;
            --nav-height: 72px;
        }

        [data-theme="dark"] {
            --color-off-white: #141413;
            --color-charcoal: #f5f5f4;
            --color-gray-100: #1c1c1a;
            --color-gray-200: #2a2a28;
            --color-gray-300: #3d3d3a;
            --color-gray-400: #78716c;
            --color-gray-500: #a8a29e;
            --color-gray-600: #d6d3d1;
            --color-gray-700: #e7e5e4;
            --color-gray-800: #f5f5f4;
            --color-gray-900: #fafaf9;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-medium: 0 12px 48px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        body {
            font-family: var(--font-sans);
            background: var(--color-off-white);
            color: var(--color-charcoal);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        h1, h2, h3, h4, p, span, div {
            overflow-wrap: break-word;
            word-wrap: break-word;
        }
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
        }
        @media (min-width: 768px) { .container { padding: 0 48px; } }
        @media (min-width: 1024px) { .container { padding: 0 64px; } }

        /* Header */
        .site-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            height: var(--nav-height);
            background: rgba(255,255,255,0.72);
            backdrop-filter: blur(16px) saturate(1.4);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        [data-theme="dark"] .site-header {
            background: rgba(20,20,19,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .site-header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            gap: 24px;
        }

        /* Logo with better styling */
        .logo {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--color-charcoal);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .logo .logo-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--color-warm-accent);
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
        }
        .logo .logo-text {
            line-height: 1;
        }

        /* New: visible inline navigation (desktop) */
        .header-nav {
            display: none;
            gap: 6px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        @media (min-width: 768px) {
            .header-nav {
                display: flex;
                flex: 1;
                justify-content: center;
            }
        }
        .header-nav a {
            text-decoration: none;
            color: var(--color-charcoal);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 40px;
            transition: background 0.3s, color 0.3s;
            white-space: nowrap;
        }
        .header-nav a:hover {
            background: var(--color-gray-200);
            color: var(--color-warm-accent);
        }
        .header-nav a.active {
            background: var(--color-charcoal);
            color: var(--color-off-white);
        }

        .nav-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .nav-btn, .theme-toggle {
            background: none;
            border: none;
            color: var(--color-charcoal);
            font-size: 1.2rem;
            padding: 8px;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .nav-btn:hover, .theme-toggle:hover {
            background: var(--color-gray-200);
            transform: scale(1.04);
        }
        .nav-btn .badge {
            position: absolute;
            top: 2px; right: 2px;
            background: var(--color-warm-accent);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 600;
            width: 18px; height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hamburger {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 4px;
        }
        .hamburger span {
            display: block;
            width: 24px; height: 2px;
            background: var(--color-charcoal);
            border-radius: 4px;
            transition: all 0.3s;
            transform-origin: center;
        }

        /* Menu overlay */
        .menu-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s, visibility 0.5s;
        }
        .menu-overlay.open { opacity: 1; visibility: visible; }
        .menu-overlay nav { display: flex; flex-direction: column; align-items: center; gap: 32px; }
        .menu-overlay a {
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 400;
            color: #fff;
            text-decoration: none;
            transition: color 0.3s, transform 0.3s;
        }
        .menu-overlay a:hover { color: var(--color-warm-accent-light); transform: translateY(-2px); }
        .close-menu {
            position: absolute;
            top: 28px; right: 32px;
            background: none; border: none;
            color: #fff; font-size: 2rem; cursor: pointer;
        }

        /* Hero */
        .hero {
            padding-top: var(--nav-height);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, var(--color-warm-accent-light) 0%, transparent 60%);
            opacity: 0.4;
        }
        .hero-content .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 48px;
            position: relative;
            z-index: 1;
        }
        @media (min-width: 1024px) {
            .hero-content .container { grid-template-columns: 1fr 1fr; gap: 64px; }
        }
        .hero-text h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.4rem, 8vw, 5rem);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.03em;
        }
        .hero-text h1 em { font-style: italic; color: var(--color-warm-accent); }
        .hero-text p {
            font-size: 1.1rem;
            color: var(--color-gray-600);
            max-width: 440px;
            margin: 20px 0 32px;
            font-weight: 300;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 40px;
            background: var(--color-charcoal);
            color: var(--color-off-white);
            border: none;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
        }
        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-hover);
            background: var(--color-warm-accent-dark);
        }
        .hero-image-wrap {
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            aspect-ratio: 4/3;
            background: var(--color-gray-100);
        }
        .hero-image-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s; }
        .hero-image-wrap:hover img { transform: scale(1.02); }
        .floating-badge {
            position: absolute;
            bottom: 20px; right: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Section titles */
        .section-title {
            font-family: var(--font-serif);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }
        .section-subtitle {
            font-size: 1rem;
            color: var(--color-gray-500);
            font-weight: 300;
            margin-bottom: 40px;
        }

        /* Rooms */
        .shop-rooms {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin: 48px 0 64px;
        }
        @media (min-width: 768px) { .shop-rooms { grid-template-columns: repeat(3, 1fr); gap: 20px; } }
        .room-card {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            aspect-ratio: 4/5;
            background: var(--color-gray-200);
            transition: transform 0.5s, box-shadow 0.5s;
        }
        .room-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
        .room-card img { width: 100%; height: 100%; object-fit: cover; }
        .room-card .room-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 32px 24px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            color: #fff;
        }
        .room-card .room-label h3 { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 400; }

        /* Featured scroll */
        .featured-scroll .sticky-label {
            display: inline-block;
            background: var(--color-charcoal);
            color: var(--color-off-white);
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .scroll-track {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            padding: 8px 4px 24px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .scroll-track::-webkit-scrollbar { display: none; }
        .scroll-item {
            flex: 0 0 260px;
            scroll-snap-align: start;
            background: var(--color-gray-100);
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s, box-shadow 0.4s;
        }
        .scroll-item:hover { transform: translateY(-6px); box-shadow: var(--shadow-medium); }
        .scroll-item img { width: 100%; height: 200px; object-fit: cover; }
        .scroll-item .item-info { padding: 16px 20px 20px; }
        .scroll-item .item-info h4 { font-size: 1rem; font-weight: 500; }
        .scroll-item .item-info .price { font-weight: 600; color: var(--color-warm-accent); margin-top: 8px; }

        /* Product grid */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 32px 0 64px;
        }
        @media (min-width: 640px) { .shop-grid { gap: 24px; } }
        @media (min-width: 1024px) { .shop-grid { grid-template-columns: repeat(3, 1fr); gap: 32px; } }
        @media (min-width: 1280px) { .shop-grid { grid-template-columns: repeat(4, 1fr); gap: 32px; } }
        .product-card {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--color-gray-100);
            aspect-ratio: 3/4;
            cursor: pointer;
            transition: transform 0.5s, box-shadow 0.5s;
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s; }
        .product-card:hover img { transform: scale(1.04); }
        .product-card .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .product-card:hover .card-overlay { opacity: 1; }
        .product-card .card-overlay .name { font-family: var(--font-serif); font-size: 1.2rem; color: #fff; line-height: 1.3; }
        .product-card .card-overlay .price { font-weight: 600; color: var(--color-warm-accent-light); margin-top: 4px; }
        .product-card .quick-view {
            position: absolute;
            top: 16px; right: 16px;
            background: rgba(255,255,255,0.92);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            opacity: 0;
            transform: translateY(-8px);
            transition: all 0.4s;
            z-index: 2;
        }
        .product-card:hover .quick-view { opacity: 1; transform: translateY(0); }

        /* Filters */
        .filters-panel {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 340px;
            max-width: 90vw;
            z-index: 800;
            background: var(--color-off-white);
            box-shadow: var(--shadow-medium);
            padding: 32px 28px;
            transform: translateX(-100%);
            transition: transform 0.5s;
            overflow-y: auto;
        }
        .filters-panel.open { transform: translateX(0); }
        .filter-group { margin-bottom: 24px; }
        .filter-group label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-gray-500); margin-bottom: 8px; }
        .filter-options { display: flex; flex-wrap: wrap; gap: 6px; }
        .filter-options button {
            padding: 6px 16px;
            border: 1px solid var(--color-gray-200);
            border-radius: 40px;
            background: transparent;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--color-charcoal);
        }
        .filter-options button.active,
        .filter-options button:hover {
            background: var(--color-charcoal);
            color: var(--color-off-white);
            border-color: var(--color-charcoal);
        }

        /* PDP */
        .pdp-wrapper { padding-top: var(--nav-height); }
        .pdp-grid { display: grid; grid-template-columns: 1fr; gap: 32px; padding: 40px 0; }
        @media (min-width: 1024px) { .pdp-grid { grid-template-columns: 60% 40%; gap: 48px; } }
        .pdp-viewer { border-radius: var(--radius-md); overflow: hidden; background: var(--color-gray-100); aspect-ratio: 4/3; }
        .pdp-viewer img { width: 100%; height: 100%; object-fit: cover; }
        .pdp-info .product-name { font-family: var(--font-serif); font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 400; line-height: 1.2; }
        .pdp-info .product-price { font-size: 1.6rem; font-weight: 600; color: var(--color-warm-accent); margin: 8px 0; }
        .pdp-info .product-desc { font-size: 1rem; color: var(--color-gray-600); font-weight: 300; line-height: 1.7; max-width: 400px; }
        .meta-row { display: flex; flex-wrap: wrap; gap: 12px 24px; font-size: 0.85rem; color: var(--color-gray-500); padding: 12px 0; border-top: 1px solid var(--color-gray-200); border-bottom: 1px solid var(--color-gray-200); margin: 16px 0; }
        .add-to-cart { display: flex; gap: 12px; margin-top: 16px; }
        .qty-selector { display: flex; align-items: center; gap: 8px; background: var(--color-gray-100); border-radius: 60px; padding: 4px 8px; border: 1px solid var(--color-gray-200); }
        .qty-selector button { background: none; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
        .cart-btn { padding: 14px 32px; background: var(--color-charcoal); color: var(--color-off-white); border: none; border-radius: 60px; font-weight: 500; cursor: pointer; transition: all 0.4s; white-space: nowrap; }
        .cart-btn:hover { background: var(--color-warm-accent-dark); transform: scale(1.02); }

        .complete-look { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--color-gray-200); }
        .complete-look h4 { font-size: 0.85rem; font-weight: 500; color: var(--color-gray-500); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px; }
        .look-carousel { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: thin; }
        .look-item { flex: 0 0 100px; text-align: center; cursor: pointer; }
        .look-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius-sm); background: var(--color-gray-100); }
        .look-item .label { font-size: 0.7rem; color: var(--color-gray-500); margin-top: 4px; }

        /* Customers also bought */
        .also-bought { margin: 32px 0 64px; }
        .also-bought h3 { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 400; margin-bottom: 20px; }
        .also-bought .drag-carousel { display: flex; gap: 16px; overflow-x: auto; padding: 8px 4px 16px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: thin; }
        .also-bought .drag-carousel .item { flex: 0 0 160px; scroll-snap-align: start; background: var(--color-gray-100); border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; border: 1px solid var(--color-gray-200); }
        .also-bought .drag-carousel .item:hover { transform: translateY(-4px); box-shadow: var(--shadow-soft); border-color: var(--color-warm-accent-light); }
        .also-bought .drag-carousel .item img { width: 100%; height: 140px; object-fit: cover; display: block; background: var(--color-gray-200); }
        .also-bought .drag-carousel .item .info { padding: 12px 14px 14px; }
        .also-bought .drag-carousel .item .info .name { font-size: 0.85rem; font-weight: 500; color: var(--color-charcoal); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .also-bought .drag-carousel .item .info .price { font-size: 0.8rem; color: var(--color-warm-accent); font-weight: 500; margin-top: 4px; }

        /* Trace journey */
        .trace-section { margin: 64px 0; padding: 48px 0; border-top: 1px solid var(--color-gray-200); border-bottom: 1px solid var(--color-gray-200); }
        .trace-section .trace-timeline { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
        .trace-step { display: flex; align-items: flex-start; gap: 16px; padding: 16px; border-radius: var(--radius-sm); background: var(--color-gray-100); border: 1px solid var(--color-gray-200); transition: all 0.3s; }
        .trace-step:hover { background: var(--color-gray-200); transform: translateX(6px); border-color: var(--color-warm-accent-light); }
        .trace-step .step-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--color-warm-accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.8rem; flex-shrink: 0; }
        .trace-step .step-content { flex: 1; }
        .trace-step .step-content .step-title { font-weight: 500; font-size: 0.95rem; color: var(--color-charcoal); }
        .trace-step .step-content .step-desc { font-size: 0.85rem; color: var(--color-gray-500); font-weight: 300; margin-top: 2px; }

        /* Testimonials */
        .testimonials { padding: 64px 0; background: var(--color-gray-100); border-top: 1px solid var(--color-gray-200); border-bottom: 1px solid var(--color-gray-200); }
        .testimonial-grid { display: grid; grid-template-columns: 1fr; gap: 24px; margin-top: 32px; }
        @media (min-width: 768px) { .testimonial-grid { grid-template-columns: repeat(3, 1fr); } }
        .testimonial-card { background: var(--color-off-white); padding: 32px 28px; border-radius: var(--radius-md); box-shadow: var(--shadow-soft); }
        .testimonial-card .stars { color: #f59e0b; margin-bottom: 12px; }
        .testimonial-card blockquote { font-size: 0.95rem; color: var(--color-gray-700); line-height: 1.7; margin-bottom: 16px; }
        .testimonial-card .customer { display: flex; align-items: center; gap: 12px; }
        .testimonial-card .customer img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }

        /* Brand story */
        .brand-story { padding: 72px 0; }
        .story-grid { display: grid; grid-template-columns: 1fr; gap: 40px; align-items: center; }
        @media (min-width: 1024px) { .story-grid { grid-template-columns: 1fr 1fr; gap: 64px; } }

            </div>
        </section>

        <section class="testimonials" id="testimonials"><div class="container" id="testimonialsContainer"></div></section>
        <section class="brand-story" id="about"><div class="container" id="brandStoryContainer"></div></section>
        <section class="blog-section container" id="journal">
            <h2 class="section-title">From the Journal</h2>
            <p class="section-subtitle">Stories, inspiration, and the art of living well.</p>
            <div class="blog-grid" id="blogGrid"></div>
        </section>

        <section class="newsletter-section" id="contact">
            <div class="container" id="newsletterContainer"></div>
        </section>
    </main>

    <footer class="site-footer"><div class="container" id="footerContainer"></div></footer>

    <div class="cookie-banner" id="cookieBanner">
        <span id="cookieText"></span>
        <div class="cookie-actions"><button id="cookieAccept"></button><button class="cookie-dismiss" id="cookieDismiss"></button></div>
    </div>

    <script>
        (function() {
            const $ = (s) => document.querySelector(s);
            const $$ = (s) => document.querySelectorAll(s);

            let cart = JSON.parse(localStorage.getItem('dakiwa-cart')) || [];
            let currentProduct = CONFIG.products[0];
            let theme = localStorage.getItem('dakiwa-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

            function saveCart() { localStorage.setItem('dakiwa-cart', JSON.stringify(cart)); }
            function setTheme(t) {
                theme = t;
                document.documentElement.setAttribute('data-theme', t);
                localStorage.setItem('dakiwa-theme', t);
                const icon = $('#themeIcon');
                if (icon) icon.className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
            function formatPrice(price) { return 'KSh ' + price.toLocaleString(); }

            function renderHeader() {
                // Logo with icon and text
                const logoEl = document.getElementById('headerLogo');
                logoEl.innerHTML = `
                    <span class="logo-icon"><i class="fas ${CONFIG.logoIcon}"></i></span>
                    <span class="logo-text">${CONFIG.logoText.replace('.','')}<span>.</span></span>
                `;
                // Desktop inline navigation
                const headerNav = document.getElementById('headerNav');
                headerNav.innerHTML = CONFIG.navLinks.map(l => `<a href="${l.url}">${l.label}</a>`).join('');
                // Mobile menu overlay
                document.getElementById('menuNav').innerHTML = CONFIG.navLinks.map(l => `<a href="${l.url}">${l.label}</a>`).join('');
                updateCartBadge();
            }
            function renderHero() {
                const h = CONFIG.hero;
                $('#heroContainer').innerHTML = `
                    <div class="hero-text"><h1>${h.title}</h1><p>${h.subtitle}</p><a href="${h.ctaLink}" class="btn-primary">${h.cta} <i class="fas fa-arrow-right"></i></a></div>
                    <div class="hero-image-wrap"><img src="${h.image}" alt="Hero" loading="lazy"><div class="floating-badge"><i class="fas fa-cube" style="color:var(--color-warm-accent);"></i>${h.floatingBadge}</div></div>`;
            }
            function renderRooms() {
                document.getElementById('roomsGrid').innerHTML = CONFIG.rooms.map(r => `
                    <div class="room-card"><img src="${r.image}" alt="${r.name}" loading="lazy"><div class="room-label"><h3>${r.name}</h3><p>${r.desc}</p></div></div>`).join('');
            }
            function renderFeatured() {
                document.getElementById('featuredTrack').innerHTML = CONFIG.featuredItems.map(f => `
                    <div class="scroll-item"><img src="${f.image}" alt="${f.name}" loading="lazy"><div class="item-info"><h4>${f.name}</h4><p class="price">${f.price}</p></div></div>`).join('');
            }
            function renderProducts(filtered = null) {
                const products = filtered || CONFIG.products;
                document.getElementById('productGrid').innerHTML = products.map(p => `
                    <div class="product-card" data-id="${p.id}">
                        <img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/600x600/FAFAF9/1E1E1E?text=Image+Not+Found'">
                        <button class="quick-view" data-id="${p.id}">Quick View</button>
                        <div class="card-overlay"><div class="name">${p.name}</div><div class="price">${formatPrice(p.price)}</div></div>
                    </div>`).join('');
            }
            function renderFilters() {
                document.getElementById('filterGroupsContainer').innerHTML = CONFIG.filterGroups.map(group => `
                    <div class="filter-group"><label>${group.title}</label>
                        <div class="filter-options">${group.options.map((opt, i) => `<button class="${i===0?'active':''}" data-group="${group.id}" data-value="${opt}">${opt}</button>`).join('')}</div></div>`).join('');
            }
            function renderPDP(product) {
                currentProduct = product;
                document.getElementById('pdpContent').innerHTML = `
                    <div class="pdp-viewer"><img src="${product.image}" alt="${product.name}" id="pdpMainImage"></div>
                    <div class="pdp-info">
                        <h1 class="product-name">${product.name}</h1>
                        <div class="product-price">${formatPrice(product.price)}</div>
                        <p class="product-desc">${product.desc}</p>
                        <div class="meta-row">
                            <span><i class="fas fa-ruler-combined"></i> ${product.dimensions}</span>
                            <span><i class="fas fa-tree"></i> ${product.material}</span>
                            <span><i class="fas fa-leaf"></i> FSC Certified</span>
                        </div>
                        <div class="add-to-cart">
                            <div class="qty-selector"><button id="qtyDec">−</button><span id="qtyDisplay">1</span><button id="qtyInc">+</button></div>
                            <button class="cart-btn" id="pdpAddToCart"><i class="fas fa-plus" style="margin-right:8px;"></i> Add to Cart</button>
                        </div>
                        <div class="complete-look"><h4>Complete the Look</h4><div class="look-carousel">${CONFIG.completeTheLook.map(l => `<div class="look-item"><img src="${l.image}" alt="${l.name}"><div class="label">${l.name}</div></div>`).join('')}</div></div>
                    </div>`;
                let qty = 1;
                const qtyDisplay = document.getElementById('qtyDisplay');
                document.getElementById('qtyDec').onclick = () => { if (qty > 1) { qty--; qtyDisplay.textContent = qty; } };
                document.getElementById('qtyInc').onclick = () => { qty++; qtyDisplay.textContent = qty; };
                document.getElementById('pdpAddToCart').onclick = () => {
                    addToCart(product, qty);
                    qty = 1; qtyDisplay.textContent = '1';
                    openCart();
                };
                document.getElementById('pdp').scrollIntoView({ behavior: 'smooth' });
            }
            function renderAlsoBought() {
                document.getElementById('alsoBoughtRow').innerHTML = CONFIG.alsoBought.map(a => `
                    <div class="item">
                        <img src="${a.image}" alt="${a.name}" loading="lazy" onerror="this.src='https://placehold.co/150x150/FAFAF9/1E1E1E?text=Image+Not+Found'">
                        <div class="info"><div class="name">${a.name}</div><div class="price">${a.price}</div></div>
                    </div>`).join('');
            }
            function renderJourney() {
                document.getElementById('journeyTimeline').innerHTML = CONFIG.journeySteps.map(s => `
                    <div class="trace-step"><div class="step-icon">${s.num}</div><div class="step-content"><div class="step-title">${s.title}</div><div class="step-desc">${s.desc}</div></div></div>`).join('');
            }
            function renderTestimonials() {
                document.getElementById('testimonialsContainer').innerHTML = `<h2 class="section-title text-center" style="text-align:center;">What our customers say</h2><p class="section-subtitle text-center" style="text-align:center;max-width:500px;margin-left:auto;margin-right:auto;">Real stories from real people who've made Dakiwa part of their home.</p><div class="testimonial-grid">${CONFIG.testimonials.map(t => `<div class="testimonial-card"><div class="stars">${'<i class="fas fa-star"></i>'.repeat(t.stars)}</div><blockquote>${t.quote}</blockquote><div class="customer"><img src="${t.image}" alt="${t.customer}" loading="lazy"><div><div class="name">${t.customer}</div><div class="role">${t.role}</div></div></div></div>`).join('')}</div>`;
            }
            function renderBrandStory() {
                const s = CONFIG.brandStory;
                document.getElementById('brandStoryContainer').innerHTML = `<div class="story-grid"><div class="story-image"><img src="${s.image}" alt="Workshop" loading="lazy"></div><div class="story-text"><h2>${s.title}</h2>${s.paragraphs.map(p => `<p>${p}</p>`).join('')}<div class="stats">${s.stats.map(st => `<div class="stat"><span class="number">${st.number}</span><span class="label">${st.label}</span></div>`).join('')}</div></div></div>`;
            }
            function renderBlog() {
                document.getElementById('blogGrid').innerHTML = CONFIG.blogPosts.map(b => `<div class="blog-card"><img src="${b.image}" alt="${b.title}" loading="lazy"><div class="blog-content"><span class="tag">${b.tag}</span><h4>${b.title}</h4><p>${b.excerpt}</p><a href="${b.link}" class="read-more">Read more <i class="fas fa-arrow-right"></i></a></div></div>`).join('');
            }
            function renderNewsletter() {
                const n = CONFIG.newsletter;
                document.getElementById('newsletterContainer').innerHTML = `
                    <h2>${n.title}</h2>
                    <p>${n.subtitle}</p>
                    <form class="newsletter-form" id="newsletterForm">
                        <input type="email" placeholder="${n.placeholder}" required>
                        <button type="submit">${n.buttonText} <i class="fas fa-arrow-right" style="margin-left:6px;"></i></button>
                    </form>
                    <p class="newsletter-privacy">${n.privacyNote}</p>`;
                document.getElementById('newsletterForm').addEventListener('submit', (e) => { e.preventDefault(); alert('Thank you for subscribing!'); e.target.reset(); });
            }
            function renderFooter() {
                document.getElementById('footerContainer').innerHTML = `
                    <div class="footer-grid">
                        <div class="footer-brand">
                            <a href="#" class="logo"><i class="fas ${CONFIG.logoIcon}"></i>Dakiwa<span>.</span></a>
                            <p>Furniture that breathes. Timeless design for modern living, crafted in Kenya.</p>
                        </div>
                        ${CONFIG.footer.columns.map(c => `
                            <div class="footer-col">
                                <h4>${c.title}</h4>
                                ${c.links.map(l => `<a href="#">${l}</a>`).join('')}
                            </div>
                        `).join('')}
                    </div>
                    <div class="footer-bottom">${CONFIG.footer.copyright}</div>`;
            }
            function renderCookieBanner() {
                document.getElementById('cookieText').textContent = CONFIG.cookieText;
                document.getElementById('cookieAccept').textContent = CONFIG.cookieAccept;
                document.getElementById('cookieDismiss').textContent = CONFIG.cookieDismiss;
                if (!localStorage.getItem('dakiwa-cookie')) setTimeout(() => $('#cookieBanner').classList.add('show'), 1200);
            }

            function addToCart(product, qty = 1) {
                const existing = cart.find(item => item.id === product.id);
                if (existing) existing.qty += qty;
                else cart.push({ ...product, qty });
                saveCart(); renderCart();
            }
            function renderCart() {
                const itemsEl = $('#cartItems');
                const footerEl = $('#cartFooter');
                const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
                if (cart.length === 0) {
                    itemsEl.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-bag"></i><p>Your cart is empty.</p></div>';
                    footerEl.innerHTML = '<div class="total"><span>Total</span><span>KSh 0.00</span></div><button class="checkout-btn" disabled>Proceed to Checkout</button>';
                } else {
                    itemsEl.innerHTML = cart.map((item, idx) => `
                        <div class="cart-item">
                            <img src="${item.image}" alt="${item.name}">
                            <div class="item-details"><div class="name">${item.name}</div><div class="price">${formatPrice(item.price)}</div></div>
                            <div class="qty-control"><button class="cart-qty-dec" data-idx="${idx}">−</button><span>${item.qty}</span><button class="cart-qty-inc" data-idx="${idx}">+</button></div>
                            <button class="remove-item" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button>
                        </div>`).join('');
                    footerEl.innerHTML = `<div class="total"><span>Total</span><span>${formatPrice(total)}</span></div><button class="checkout-btn">Proceed to Checkout</button>`;
                }
                updateCartBadge();
                $$('.cart-qty-dec').forEach(btn => btn.onclick = function() { const idx = this.dataset.idx; if (cart[idx].qty > 1) cart[idx].qty--; else cart.splice(idx, 1); saveCart(); renderCart(); });
                $$('.cart-qty-inc').forEach(btn => btn.onclick = function() { cart[this.dataset.idx].qty++; saveCart(); renderCart(); });
                $$('.remove-item').forEach(btn => btn.onclick = function() { cart.splice(this.dataset.idx, 1); saveCart(); renderCart(); });
            }
            function updateCartBadge() { $('#cartBadge').textContent = cart.reduce((s, i) => s + i.qty, 0); }
            function openCart() { $('#cartPanel').classList.add('open'); $('#cartOverlay').classList.add('open'); document.body.style.overflow = 'hidden'; }
            function closeCart() { $('#cartPanel').classList.remove('open'); $('#cartOverlay').classList.remove('open'); document.body.style.overflow = ''; }

            function applyFilters() {
                const active = {};
                document.querySelectorAll('#filterGroupsContainer .filter-options button.active').forEach(btn => {
                    if (btn.dataset.value !== 'All') active[btn.dataset.group] = btn.dataset.value;
                });
                let filtered = CONFIG.products;
                if (active.category) filtered = filtered.filter(p => p.category === active.category);
                if (active.material) filtered = filtered.filter(p => p.material === active.material);
                if (active.colour) filtered = filtered.filter(p => p.colour === active.colour);
                if (active.price) {
                    const pf = active.price;
                    filtered = filtered.filter(p => {
                        if (pf === 'Under KSh 10,000') return p.price < 10000;
                        if (pf === 'KSh 5,000–10,000') return p.price >= 5000 && p.price <= 10000;
                        if (pf === 'KSh 10,000–15,000') return p.price >= 10000 && p.price <= 15000;
                        if (pf === 'KSh 15,000+') return p.price > 15000;
                        return true;
                    });
                }
                renderProducts(filtered);
            }

            function init() {
                setTheme(theme);
                renderHeader(); renderHero(); renderRooms(); renderFeatured(); renderFilters(); renderProducts();
                renderPDP(CONFIG.products[0]); renderAlsoBought(); renderJourney(); renderTestimonials();
                renderBrandStory(); renderBlog(); renderNewsletter(); renderFooter(); renderCookieBanner(); renderCart();

                $('#themeToggle').addEventListener('click', () => setTheme(theme === 'dark' ? 'light' : 'dark'));
                $('#menuToggle').addEventListener('click', () => $('#menuOverlay').classList.add('open'));
                $('#closeMenu').addEventListener('click', () => $('#menuOverlay').classList.remove('open'));
                $('#cartToggle').addEventListener('click', openCart);
                $('#closeCart').addEventListener('click', closeCart);
                $('#cartOverlay').addEventListener('click', closeCart);
                $('#filtersToggle').addEventListener('click', () => $('#filtersPanel').classList.add('open'));
                $('#closeFilters').addEventListener('click', () => $('#filtersPanel').classList.remove('open'));
                document.getElementById('cookieAccept').addEventListener('click', () => { localStorage.setItem('dakiwa-cookie', 'accepted'); $('#cookieBanner').classList.remove('show'); });
                document.getElementById('cookieDismiss').addEventListener('click', () => { localStorage.setItem('dakiwa-cookie', 'dismissed'); $('#cookieBanner').classList.remove('show'); });

                document.getElementById('productGrid').addEventListener('click', (e) => {
                    const card = e.target.closest('.product-card');
                    if (card) { const p = CONFIG.products.find(p => p.id === parseInt(card.dataset.id)); if (p) renderPDP(p); }
                });
                document.getElementById('filterGroupsContainer').addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        const group = e.target.dataset.group;
                        document.querySelectorAll(`#filterGroupsContainer .filter-options button[data-group="${group}"]`).forEach(btn => btn.classList.remove('active'));
                        e.target.classList.add('active');
                        applyFilters();
                    }
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        $('#menuOverlay').classList.remove('open');
                        $('#filtersPanel').classList.remove('open');
                        closeCart();
                    }
                });
                console.log('🌿 Dakiwa – header links visible, logo styled, fully responsive.');
            }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
</html>
